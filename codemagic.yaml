workflows:
  android-build:
    name: Elite Earn Android Build
    max_build_duration: 60
    environment:
      node: 18
    scripts:
      - rm -rf node_modules package-lock.json
      - npm install
      - npx expo prebuild -p android --clean
      - cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk

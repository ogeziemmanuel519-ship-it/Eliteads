workflows:
  android-build:
    name: Elite Earn Android Build
    max_build_duration: 60
    environment:
      node: 20
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
    scripts:
      - npm install
      - npx expo install --fix
      - npx expo prebuild -p android
      - cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
